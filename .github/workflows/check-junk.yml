name: Check Junk Files

on:
  pull_request:
  push:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Detect macOS junk files
        run: |
          echo "Checking for .DS_Store..."
          if find . -name ".DS_Store" | grep -q .; then
            echo "❌ Found .DS_Store files!"
            exit 1
          fi

          if find . -name "._*" | grep -q .; then
            echo "❌ Found macOS hidden files!"
            exit 1
          fi

          echo "✅ Clean!"
